<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Subtitle Output</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.png" />
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/script.js" defer></script>
</head>

<body>
    <header class="header">
        <h1>Subtitle Data</h1>
        <h4>Real-Time Broadcast Subtitle Capture and AI-Driven Analysis System</h4>

    </header>

    <!-- ======================================================= -->
    <div class="control-panel" style="border: 1px solid #ccc; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
        <h3>Injest New Broadcast Media Folder</h3>
        <input type="text" id="webInPath" placeholder="D:\Media\The Late Late Show" style="width:300px; padding:6px;">
        <input type="password" id="webHfToken" placeholder="HuggingFace Token (hf_...)"
            style="width:250px; padding:6px;">
        <button id="runBtn" onclick="sendTranscriptionJob()" style="padding:6px 12px; cursor:pointer;">Launch AI
            Pipeline</button>
        <p id="statusFeedback" style="font-weight:bold; color:blue;"></p>
    </div>

    <script>
        async function sendTranscriptionJob() {
            const inputPath = document.getElementById('webInPath').value;
            const hfToken = document.getElementById('webHfToken').value;
            const feedback = document.getElementById('statusFeedback');

            if (!inputPath || !hfToken) {
                alert("Please specify both folder locations and your HF developer authentication token.");
                return;
            }

            feedback.textContent = "Sending execution command to pipeline server...";

            try {
                const response = await fetch('http://127.0.0.1:8000/api/transcribe', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ input_path: inputPath, hf_token: hfToken })
                });

                const data = await response.json();
                if (response.ok) {
                    feedback.style.color = "green";
                    feedback.textContent = `Success! Transcription script triggered. Check terminal window. Target folder: ${data.output_folder}`;
                } else {
                    feedback.style.color = "red";
                    feedback.textContent = `Error: ${data.detail}`;
                }
            } catch (err) {
                feedback.style.color = "red";
                feedback.textContent = "Could not connect to the local Python execution server backend.";
            }
        }
    </script>
    <!-- ======================================================= -->

    <form method="post" enctype="multipart/form-data">
        <div>
            <label for="file" class="fileUpload"><br>Supports JSON files processed through WhisperX only. Choose file(s)
                to upload: </label>
            <input type="file" id="file" name="file" accept=".json" multiple />
            <!-- Toggle start/end times -->
            <br>
            <label class="switch">
                <input type="checkbox" id="mySwitch">
                <span class="slider round"></span>
            </label>
            <p id="status">Start/End Times Visible</p>

            <!-- Toggle speaker visibility -->
            <br>
            <label class="switch">
                <input type="checkbox" id="mySpeakerSwitch">
                <span class="slider round"></span>
            </label>
            <p id="speakerStatus">Speaker Always Visible</p>
        </div>
    </form>

    <div id="toc-container">
        <h3>Search:</h3>
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="Search subtitles...">
            <button type="button" id="searchButton" class="search-button">Search</button>
        </div>
        <h3><br>Table of Contents:</h3>
        <ul id="toc-list"></ul>
    </div>

    <div class="footer">
        <p>QUB Electronics, Electrical Engineering and Computer Science</p>
    </div>

    <div id="subtitle-list"></div>

</body>

</html>
